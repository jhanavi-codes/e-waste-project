<h2>Remove Employees</h2>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Phone</th>
        <th>Area</th>
        <th>Delete</th>
    </tr>

    {% for emp in employees %}
    <tr>
        <td>{{ emp[0] }}</td>
        <td>{{ emp[1] }}</td>
        <td>{{ emp[2] }}</td>
        <td>{{ emp[3] }}</td>
        <td>
            <a href="/delete_employee/{{ emp[0] }}">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>

<br>
<a href="/admin">Back to Dashboard</a>
