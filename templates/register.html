<!DOCTYPE html>
<html>
<head>
    <title>Register - E-Waste Management System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #e8f5e9, #f4f4f4);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 0 12px lightgray;
            width: 450px;
        }

        h1 {
            text-align: center;
            color: #1b5e20;
            margin-bottom: 25px;
        }

        label {
            font-size: 18px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            margin-bottom: 18px;
            box-sizing: border-box;
        }

        input[type="submit"] {
            background-color: green;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: darkgreen;
        }

        .home-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            text-decoration: none;
            color: green;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>User Registration</h1>

        <form method="POST" action="/register">
            <label>Full Name:</label>
            <input type="text" name="fullname">

            <label>Email:</label>
            <input type="email" name="email">

            <label>Phone Number:</label>
            <input type="text" name="phone">

            <label>Password:</label>
            <input type="password" name="password">

            <input type="submit" value="Register">
        </form>

        <a href="/" class="home-link">Back to Home</a>
    </div>
</body>
</html>
