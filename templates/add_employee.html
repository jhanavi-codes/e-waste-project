<!DOCTYPE html>
<html>
<head>
    <title>Add Employee</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 400px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #2f5d50;
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-top: 12px;
            margin-bottom: 6px;
            font-size: 18px;
        }

        input {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        input[type="submit"] {
            background: #28a745;
            color: white;
            border: none;
            margin-top: 15px;
            cursor: pointer;
            font-weight: bold;
        }

        input[type="submit"]:hover {
            background: #218838;
        }

        .home-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            text-decoration: none;
            color: #2f8f46;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Add Employee</h1>

        <form method="POST" action="/add_employee">
            <label>Employee Name:</label>
            <input type="text" name="name" required>

            <label>Phone:</label>
            <input type="text" name="phone" required>

            <label>Area:</label>
            <input type="text" name="area" required>

            <input type="submit" value="Add Employee">
        </form>

        <a href="/admin" class="home-link">Back to Admin Dashboard</a>
    </div>
</body>
</html>
