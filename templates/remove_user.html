<h2>Remove Users</h2>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Email</th>
        <th>Delete</th>
    </tr>

    {% for user in users %}
    <tr>
        <td>{{ user[0] }}</td>
        <td>{{ user[1] }}</td>
        <td>
            <a href="/delete_user/{{ user[0] }}">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>
