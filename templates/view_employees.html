<!DOCTYPE html>
<html>
<head>
    <title>Employees</title>
    <style>
        body{
            font-family: Arial;
            background: #f4f6f8;
            text-align: center;
        }

        h2{
            color: #1b5e20;
        }

        table{
            margin: auto;
            border-collapse: collapse;
            width: 70%;
        }

        th{
            background: #2e7d32;
            color: white;
            padding: 10px;
        }

        td{
            padding: 10px;
            border-bottom: 1px solid #ccc;
        }

        a{
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: #2e7d32;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h2>Employee List</h2>

<table>
    <tr>
        <th>Name</th>
        <th>Phone</th>
        <th>Area</th>
        <th>Status</th>
    </tr>

    {% for emp in employees %}
    <tr>
        <td>{{ emp[0] }}</td>
        <td>{{ emp[1] }}</td>
        <td>{{ emp[2] }}</td>
        <td>{{ emp[3] }}</td>
    </tr>
    {% endfor %}
</table>

<a href="/admin">⬅ Back to Dashboard</a>

</body>
</html>
